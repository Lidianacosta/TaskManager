name: Backend CI/CD

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master", "develop" ]

jobs:
  backend-ci-cd:
    name: Backend CI/CD
    runs-on: ubuntu-latest

    steps:
    - name: Check out repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install uv
      run: |
        python -m pip install --upgrade pip
        pip install uv

    - name: Install dependencies
      working-directory: backend
      run: uv sync --locked --all-groups

    - name: Run lint checks
      working-directory: backend
      run: uv run ruff check src

    - name: Run tests
      working-directory: backend
      run: uv run pytest --cov=src --cov-report=xml

    - name: Deploy to Develop
      if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
      env:
        HOOK: ${{ secrets.RENDER_DEVELOP_DEPLOY_HOOK }}
      run: |
        if [ -n "$HOOK" ]; then
          curl -f -X POST "$HOOK"
        else
          echo "RENDER_DEVELOP_DEPLOY_HOOK is not set. Skipping deploy."
        fi

    - name: Deploy to Production
      if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && github.event_name == 'push'
      env:
        HOOK: ${{ secrets.RENDER_PRODUCTION_DEPLOY_HOOK }}
      run: |
        if [ -n "$HOOK" ]; then
          curl -f -X POST "$HOOK"
        else
          echo "RENDER_PRODUCTION_DEPLOY_HOOK is not set. Skipping deploy."
        fi
