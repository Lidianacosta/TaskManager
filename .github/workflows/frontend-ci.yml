name: Frontend CI/CD

on:
  push:
    branches: [ "main", "master", "develop" ]
    paths:
      - 'FRONTEND/**'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    branches: [ "main", "master", "develop" ]
    paths:
      - 'FRONTEND/**'
      - '.github/workflows/frontend-ci.yml'

jobs:
  frontend-ci-cd:
    name: Frontend CI/CD
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: FRONTEND

    steps:
    - name: Check out repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: FRONTEND/package-lock.json

    - name: Install dependencies
      run: npm ci

    - name: Run TypeScript check
      run: npm run typecheck

    - name: Run tests
      run: npx vitest run

    - name: Build frontend
      run: npm run build

    - name: Deploy to Netlify (Preview)
      if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
      env:
        NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
        NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
      run: |
        if [ -n "$NETLIFY_AUTH_TOKEN" ] && [ -n "$NETLIFY_SITE_ID" ]; then
          npx netlify-cli deploy --dir=dist --auth=$NETLIFY_AUTH_TOKEN --site=$NETLIFY_SITE_ID
        else
          echo "Netlify credentials not set. Skipping deploy."
        fi

    - name: Deploy to Netlify (Production)
      if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && github.event_name == 'push'
      env:
        NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
        NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
      run: |
        if [ -n "$NETLIFY_AUTH_TOKEN" ] && [ -n "$NETLIFY_SITE_ID" ]; then
          npx netlify-cli deploy --dir=dist --prod --auth=$NETLIFY_AUTH_TOKEN --site=$NETLIFY_SITE_ID
        else
          echo "Netlify credentials not set. Skipping deploy."
        fi
